<style>
:root {
  --pink: #E91E63;
  --pink-light: #FFF0F3;
  --pink-dark: #C2185B;
  --text: #212121;
  --text-light: #757575;
  --bg: #ffffff;
  --card-bg: #fff;
  --shadow: 0 2px 20px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans', 'Noto Sans SC', sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Language Switcher */
.lang-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex; justify-content: center; align-items: center;
  padding: 8px 16px; gap: 4px; flex-wrap: wrap;
}
.lang-bar button {
  background: none; border: 1px solid transparent;
  padding: 4px 10px; border-radius: 6px;
  font-size: 13px; cursor: pointer; color: var(--text-light);
  transition: all 0.2s;
}
.lang-bar button:hover { background: var(--pink-light); color: var(--pink); }
.lang-bar button.active {
  background: var(--pink); color: #fff;
  border-color: var(--pink);
}

/* Hero */
.hero {
  padding: 120px 24px 80px;
  text-align: center;
  background: linear-gradient(180deg, var(--pink-light) 0%, var(--bg) 100%);
}
.hero img {
  width: 120px; height: 120px;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(233,30,99,0.2);
  margin-bottom: 24px;
}
.hero h1 {
  font-size: 42px; font-weight: 700;
  letter-spacing: -0.5px; margin-bottom: 8px;
}
.hero h1 span { color: var(--pink); }
.hero .tagline {
  font-size: 18px; color: var(--text-light);
  max-width: 500px; margin: 0 auto 32px;
}
.hero .badges { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.hero .badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--card-bg); border: 1px solid #eee;
  padding: 8px 16px; border-radius: 20px;
  font-size: 14px; color: var(--text);
}
.hero .badge svg { width: 18px; height: 18px; color: var(--pink); }

/* Features */
.features {
  max-width: 960px; margin: 0 auto;
  padding: 60px 24px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}
.feature-card {
  background: var(--card-bg);
  border: 1px solid #f0f0f0;
  border-radius: 16px;
  padding: 32px 24px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.feature-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}
.feature-card .icon {
  width: 48px; height: 48px;
  background: var(--pink-light);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; font-size: 24px;
}
.feature-card h3 { font-size: 18px; margin-bottom: 8px; font-weight: 600; }
.feature-card p { font-size: 14px; color: var(--text-light); line-height: 1.7; }

/* How it works */
.how-section {
  background: var(--pink-light);
  padding: 60px 24px;
  text-align: center;
}
.how-section h2 { font-size: 32px; font-weight: 700; margin-bottom: 40px; }
.steps {
  max-width: 800px; margin: 0 auto;
  display: flex; gap: 32px; justify-content: center; flex-wrap: wrap;
}
.step {
  flex: 1; min-width: 200px; max-width: 240px;
}
.step .num {
  width: 56px; height: 56px;
  background: var(--pink); color: #fff;
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700;
  margin: 0 auto 16px;
}
.step h4 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.step p { font-size: 14px; color: var(--text-light); }

/* Privacy */
.privacy-section {
  max-width: 720px; margin: 0 auto;
  padding: 60px 24px; text-align: center;
}
.privacy-section h2 { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
.privacy-section .desc { font-size: 16px; color: var(--text-light); margin-bottom: 32px; }
.privacy-list {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 16px;
}
.privacy-item {
  display: flex; align-items: center; gap: 8px;
  background: #f8f8f8; padding: 12px 20px;
  border-radius: 12px; font-size: 14px; font-weight: 500;
}
.privacy-item .check { color: var(--pink); font-size: 18px; }

/* Support */
.support-section {
  background: var(--text);
  color: #fff;
  padding: 60px 24px;
  text-align: center;
}
.support-section h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
.support-section p { color: rgba(255,255,255,0.6); margin-bottom: 24px; font-size: 15px; }
.support-section a {
  color: var(--pink); text-decoration: none;
  font-size: 18px; font-weight: 600;
}
.support-section a:hover { text-decoration: underline; }
.support-section .copy {
  margin-top: 40px; font-size: 13px;
  color: rgba(255,255,255,0.3);
}

@media (max-width: 600px) {
  .hero h1 { font-size: 32px; }
  .hero .tagline { font-size: 16px; }
  .features { grid-template-columns: 1fr; }
  .steps { flex-direction: column; align-items: center; }
  .lang-bar { gap: 2px; }
  .lang-bar button { font-size: 12px; padding: 3px 7px; }
}
</style>
</head>

function detectLang() {
  const hash = location.hash.replace('#', '');
  if (hash && I18N[hash]) return hash;
  const saved = localStorage.getItem('loveyou_lang');
  if (saved && I18N[saved]) return saved;
  const nav = navigator.language || 'en';
  if (I18N[nav]) return nav;
  const base = nav.split('-')[0];
  for (const k of Object.keys(I18N)) {
    if (k.startsWith(base)) return k;
  }
  return 'en';
}

function setLang(code) {
  localStorage.setItem('loveyou_lang', code);
  location.hash = code;
  document.documentElement.lang = code;
  const strings = I18N[code] || I18N['en'];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key]) el.textContent = strings[key];
  });
  document.querySelectorAll('.lang-bar button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === code);
  });
}

function initLangBar() {
  const bar = document.getElementById('langBar');
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.textContent = l.label;
    btn.dataset.lang = l.code;
    btn.onclick = () => setLang(l.code);
    bar.appendChild(btn);
  });
}

initLangBar();
setLang(detectLang());
