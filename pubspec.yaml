name: love_you
description: LoveYou - 独居安全守护 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16

  # State Management
  provider: ^6.1.2

  # Background Services
  workmanager: ^0.5.2

  # HTTP

  # Speech Recognition (P1)
  speech_to_text: ^7.0.0
  mailer: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
